services:
  db:
    image: postgres:16-alpine
    container_name: buckettrips-db
    environment:
      POSTGRES_DB: buckettrips
      POSTGRES_USER: buckettrips
      POSTGRES_PASSWORD: buckettrips
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buckettrips -d buckettrips"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buckettrips-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql://buckettrips:buckettrips@db:5432/buckettrips?schema=public
      DIRECT_URL: postgresql://buckettrips:buckettrips@db:5432/buckettrips?schema=public
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
